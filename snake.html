<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뱀 게임 - Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }
        h1 { color: #fff; margin-bottom: 10px; }
        #gameCanvas {
            border: 3px solid #58a6ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.3);
        }
        .score {
            color: #58a6ff;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .controls {
            color: #8b949e;
            margin-top: 15px;
            text-align: center;
        }
        a { color: #58a6ff; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🐍 뱀 게임</h1>
    <div class="score">점수: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        방향키로 이동 | 스페이스바 일시정지<br>
        <a href="index.html">← 메인으로</a>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop;
        let isPaused = false;
        
        function init() {
            document.addEventListener('keydown', keyDown);
            gameLoop = setInterval(game, 100);
        }
        
        function keyDown(e) {
            if (e.key === ' ' || e.key === 'Spacebar') {
                isPaused = !isPaused;
                return;
            }
            if (isPaused) return;
            
            switch(e.key) {
                case 'ArrowUp': if (dy !== 1) { dx = 0; dy = -1; } break;
                case 'ArrowDown': if (dy !== -1) { dx = 0; dy = 1; } break;
                case 'ArrowLeft': if (dx !== 1) { dx = -1; dy = 0; } break;
                case 'ArrowRight': if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        }
        
        function game() {
            if (isPaused) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#238636';
            snake.forEach((segment, i) => {
                ctx.fillStyle = i === 0 ? '#3fb950' : '#238636';
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
            
            ctx.fillStyle = '#f85149';
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '30px Noto Sans KR';
            ctx.textAlign = 'center';
            ctx.fillText('게임 오버!', canvas.width/2, canvas.height/2);
            ctx.font = '20px Noto Sans KR';
            ctx.fillText('점수: ' + score, canvas.width/2, canvas.height/2 + 40);
            ctx.fillText('새로고침하여 재시작', canvas.width/2, canvas.height/2 + 80);
        }
        
        init();
    </script>
</body>
</html>
